name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Assuming Node 20
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Build TypeScript
        run: npm run build

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Build Next.js
        run: npm run build

  backend-cd:
    name: Backend CD (Deploy to Render)
    needs: [backend-ci, frontend-ci]
    runs-on: ubuntu-latest
    # Only deploy when code is pushed directly to the main branch
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          if [ -z "${{ secrets.RENDER_BACKEND_HOOK }}" ]; then
            echo "Error: RENDER_BACKEND_HOOK secret is not set!"
            exit 1
          fi
          curl -X POST "${{ secrets.RENDER_BACKEND_HOOK }}"
